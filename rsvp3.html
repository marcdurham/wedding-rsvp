<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding RSVP - Version 3: Modern Dark</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center text-white">
    <div class="max-w-sm mx-auto bg-gray-800 p-6 rounded-lg shadow-xl">
        <h1 class="text-2xl font-bold text-center mb-4">Hi John!</h1>
        <p class="text-center mb-6">Let us know if you'll attend.</p>
        <form onsubmit="alert('RSVP Submitted!'); return false;">
            <div class="mb-4">
                <label class="block text-gray-300 text-sm font-bold mb-2">Number of Guests</label>
                <input type="number" min="0" class="bg-gray-700 border-gray-600 border rounded w-full py-2 px-3 text-white focus:outline-none focus:border-blue-500" required>
            </div>
            <div class="mb-4">
                <label class="block text-gray-300 text-sm font-bold mb-2">Note</label>
                <textarea rows="3" class="bg-gray-700 border-gray-600 border rounded w-full py-2 px-3 text-white focus:outline-none focus:border-blue-500"></textarea>
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">Submit RSVP</button>
        </form>
    </div>
</body>
</html>
